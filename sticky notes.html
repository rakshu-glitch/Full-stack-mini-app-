<!DOCTYPE html>
<html>
<head>
<title>Sticky Notes App</title>
</head>

<body style="font-family:Arial;text-align:center;margin:20px;transition:0.3s;">

<button id="toggle" style="position:fixed;top:10px;right:10px;padding:8px;">
Dark Mode
</button>

<h1>Sticky Notes</h1>

<input id="noteInput" placeholder="Write note..." style="padding:8px;">
<button onclick="addNote()">Add</button>

<div id="notes"></div>

<script>

/* Dark Mode */

const btn=document.getElementById("toggle");

if(localStorage.getItem("theme")=="dark"){
document.body.style.background="#121212";
document.body.style.color="white";
}

btn.onclick=()=>{
document.body.classList.toggle("dark");

if(document.body.style.background=="rgb(18, 18, 18)"){
document.body.style.background="white";
document.body.style.color="black";
localStorage.setItem("theme","light");
}else{
document.body.style.background="#121212";
document.body.style.color="white";
localStorage.setItem("theme","dark");
}
}

/* Sticky Notes */

let notes=JSON.parse(localStorage.getItem("notes"))||[];

function show(){
let box=document.getElementById("notes");
box.innerHTML="";
notes.forEach((n,i)=>{
box.innerHTML+=`<div style="background:yellow;margin:10px;padding:10px;display:inline-block;">
${n}<br><button onclick="del(${i})">Delete</button></div>`;
});
}

function addNote(){
let input=document.getElementById("noteInput");
if(input.value=="") return;
notes.push(input.value);
localStorage.setItem("notes",JSON.stringify(notes));
input.value="";
show();
}

function del(i){
notes.splice(i,1);
localStorage.setItem("notes",JSON.stringify(notes));
show();
}

show();

</script>

</body>
</html>
